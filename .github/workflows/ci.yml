name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest pytest-cov
      # Runs the suite against the *declared* dependency floors — this is what
      # verifies the pandas>=2.0 claim (see REVIEW.md P0-1).
      - name: Test
        run: python -m pytest -q

  lint:
    runs-on: ubuntu-latest
    continue-on-error: true  # advisory until the standing ruff findings are cleared (P0-4)
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check .
